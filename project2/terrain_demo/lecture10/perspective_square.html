<!DOCTYPE html>
<html lang="en">

<!-- Load the JavaScript function "main" stored in the loaded file below -->

<body onload="main()">
    <!-- WebGL Utility Scripts -->
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix-quat03.js"></script>

    <!-- Select a JavaScript file -->
    <script src="perspective_square.js"></script>

    <!-- Setup the Canvas -->
    <p>
        <canvas id="webgl" width="300" height="300">
            Please use a browser that supports "canvas"
        </canvas>
    </p>

    <!-- Add a slider -->
    <div>
        <input type="range" id="slider" min="0.0" max="1" step=".01" />
    </div>
    <p id="projection_amount"></p>

</body>

</html>
