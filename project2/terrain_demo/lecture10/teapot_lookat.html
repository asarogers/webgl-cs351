<!DOCTYPE html>
<html lang="en">

<header>
    <!-- Sets an icon for the page -->
    <link rel="icon" type="image/x-icon" href="/resources/favicon.ico">
</header>

<body onload="main()">
    <!-- WebGL Utility Scripts -->
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix-quat03.js"></script>

    <!-- Select a JavaScript file -->
    <script src="teapot_lookat.js"></script>

    <!-- Setup the Canvas -->
    <canvas id="canvas" width="400" height="400">
        Please use a browser that supports "canvas"
    </canvas>

    <!-- Add camera controls -->
    <div>
        <input type="range" id="sliderEyeX" min="-1" max="1" step=".01" />
        <label id="eyeX" for="sliderEyeX"></label>
    </div>
    <div>
        <input type="range" id="sliderEyeY" min="-1" max="1" step=".01" />
        <label id="eyeY" for="sliderEyeY"></label>
    </div>
    <div>
        <input type="range" id="sliderEyeZ" min="-1" max="1" step=".01" />
        <label id="eyeZ" for="sliderEyeZ"></label>
    </div>
    <div>
        <input type="range" id="sliderCenterX" min="-1" max="1" step=".01" />
        <label id="centerX" for="sliderCenterX"></label>
    </div>
    <div>
        <input type="range" id="sliderCenterY" min="-1" max="1" step=".01" />
        <label id="centerY" for="sliderCenterY"></label>
    </div>
    <div>
        <input type="range" id="sliderCenterZ" min="-1" max="1" step=".01" />
        <label id="centerZ" for="sliderCenterZ"></label>
    </div>

</body>

</html>
